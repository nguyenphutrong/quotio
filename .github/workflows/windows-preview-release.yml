name: Windows Preview Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Preview tag to publish, e.g. windows-preview-2026-06-10'
        required: true
        type: string
      title:
        description: 'Release title'
        required: false
        type: string
  push:
    tags:
      - 'windows-preview-*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Build and publish Windows preview
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Resolve release metadata
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
            $title = "${{ github.event.inputs.title }}"
          } else {
            $tag = "${{ github.ref_name }}"
            $title = ""
          }

          if ([string]::IsNullOrWhiteSpace($tag) -or -not $tag.StartsWith("windows-preview-")) {
            throw "Windows preview releases must use a windows-preview-* tag."
          }
          if ([string]::IsNullOrWhiteSpace($title)) {
            $title = "Quotio Windows Preview $tag"
          }

          "PREVIEW_TAG=$tag" >> $env:GITHUB_ENV
          "PREVIEW_TITLE=$title" >> $env:GITHUB_ENV
          "ARTIFACT_NAME=quotio-windows-preview-$tag.zip" >> $env:GITHUB_ENV

      - run: bun install --frozen-lockfile
      - run: bun run contracts:check
      - run: bun run windows:gates:check
      - run: bun run build
      - run: dotnet build apps/windows-host/Quotio.Windows.csproj --configuration Debug
      - run: dotnet run --project apps/windows-host-smoke/Quotio.WindowsSmoke.csproj --configuration Release

      - name: Package and verify Windows preview
        shell: pwsh
        run: ./scripts/package-windows-preview.ps1 -ArtifactName "$env:ARTIFACT_NAME" -CommitSha "${{ github.sha }}"

      - name: Write release notes
        shell: pwsh
        run: |
          @"
          ## Windows Preview

          This is an unsigned preview build for smoke testing the native Windows host.

          - Not a production Windows release.
          - No installer, signing, or updater is included yet.
          - Includes the bundled shared desktop UI, Windows runtime bridge, read-only agent detection, and Codex CLI install/rollback with timestamped backups.
          - Other agent write paths remain disabled until their Windows backup and rollback behavior is verified.
          - Built from commit `${{ github.sha }}`.
          "@ | Set-Content -Path artifacts/windows-preview-notes.md -Encoding utf8

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.PREVIEW_TAG }}
          name: ${{ env.PREVIEW_TITLE }}
          body_path: artifacts/windows-preview-notes.md
          prerelease: true
          files: |
            artifacts/${{ env.ARTIFACT_NAME }}
            artifacts/${{ env.ARTIFACT_NAME }}.sha256
            artifacts/${{ env.ARTIFACT_NAME }}.manifest.json
