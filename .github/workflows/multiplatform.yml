name: Multiplatform

on:
  pull_request:
  push:
    branches:
      - dev
      - 'feature/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1'
      - name: Build Quotio
        run: xcodebuild -project Quotio.xcodeproj -scheme Quotio -configuration Debug build
      - name: Build Quotio Beta
        run: xcodebuild -project Quotio.xcodeproj -scheme "Quotio Beta" -configuration Beta build
      - name: Run agent config smoke tests
        run: ./scripts/run-codex-patcher-smoke.sh && ./scripts/run-agent-config-smoke.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - run: bun install --frozen-lockfile
      - run: bun run contracts:check
      - run: bun run windows:gates:check
      - run: bun run desktop-ui:bootstrap:check
      - run: bun run desktop-ui:gateway-url:check
      - run: bun run typecheck
      - run: bun run build
      - run: bun run format-and-lint

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  windows:
    name: Windows preview artifact (no installer/signing)
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - run: bun install --frozen-lockfile
      - run: bun run windows:gates:check
      - run: bun run build
      - run: dotnet build apps/windows-host/Quotio.Windows.csproj --configuration Release
      - run: dotnet run --project apps/windows-host-smoke/Quotio.WindowsSmoke.csproj --configuration Release
      - name: Package Windows preview artifact
        shell: pwsh
        run: ./scripts/package-windows-preview.ps1 -CommitSha "${{ github.sha }}"
      - uses: actions/upload-artifact@v6
        with:
          name: quotio-windows-preview
          path: |
            artifacts/quotio-windows-preview.zip
            artifacts/quotio-windows-preview.zip.sha256
            artifacts/quotio-windows-preview.zip.manifest.json
          if-no-files-found: error
