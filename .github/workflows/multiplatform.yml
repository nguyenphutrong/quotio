name: Multiplatform

on:
  pull_request:
  push:
    branches:
      - dev
      - 'feature/**'

jobs:
  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1'
      - name: Build Quotio
        run: xcodebuild -project Quotio.xcodeproj -scheme Quotio -configuration Debug build
      - name: Run agent config smoke tests
        run: ./scripts/run-codex-patcher-smoke.sh && ./scripts/run-agent-config-smoke.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - run: bun install --frozen-lockfile
      - run: bun run contracts:check
      - run: bun run typecheck
      - run: bun run build
      - run: bun run format-and-lint

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  windows:
    name: Windows preview build (no installer/signing)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet build apps/windows-host/Quotio.Windows.csproj
